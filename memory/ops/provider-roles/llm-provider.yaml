# Role: llm-provider

## Purpose

Generates text from a prompt, with optional system message, tool-use, and structured output. Used by the tenant's API service for chart readings, party reading flows, and any other LLM-mediated feature.

## Required operations

- name: complete
  inputs:
    messages: { type: list, item_type: chat-message }
    system: { type: string, optional: true }
    max_tokens: { type: int }
    temperature: { type: float, optional: true, default: 1.0 }
    tools: { type: list, item_type: tool-spec, optional: true }
  outputs:
    content: { type: string | structured }
    stop_reason: { type: enum, values: [end_turn, max_tokens, stop_sequence, tool_use] }
    usage: { type: object, fields: [input_tokens, output_tokens] }

- name: stream-complete
  inputs: same as complete
  outputs: chunks of content via callback or async iterator

## Required metadata

- model_id (vendor-specific identifier)
- context_window_tokens
- max_output_tokens
- input_cost_per_million_tokens_usd
- output_cost_per_million_tokens_usd
- latency_p95_first_token_ms
- supports_tool_use: bool
- supports_structured_output: bool

## Hard rules (ranker cannot override)

- API endpoint MUST be HTTPS.
- Model identity MUST NOT change silently — version pinning is required.
- Adapter MUST handle rate-limit responses (429) by surfacing to caller; silent retries are forbidden.
- Latency p95 first-token MUST be ≤ 5000 ms for interactive flows.

## Notes

The tenant voice ("<your-tenant-voice>") is enforced via prompts at the consumer layer, not at the provider layer. An llm-provider adapter is voice-neutral.
