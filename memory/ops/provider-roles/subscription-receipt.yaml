# Role: subscription-receipt

## Purpose

Validates iOS / Android in-app purchase receipts and exposes subscription status (active / expired / refunded / lapsed) to the API.

## Required operations

- name: validate-receipt
  inputs:
    platform: { type: enum, values: [ios, android] }
    receipt_data: { type: string | binary }
    user_id: { type: string }
  outputs:
    status: { type: enum, values: [active, expired, refunded, lapsed, unknown] }
    expires_at: { type: timestamp, optional: true }
    product_id: { type: string }

- name: subscribe-events (webhook for status changes)

## Required metadata

- supported_platforms (subset of [ios, android, web])
- supports_promo_codes: bool
- supports_grace_period: bool
- price_model (per-validation | flat | revenue-share)

## Hard rules

- Receipt validation MUST be server-side (never trust client claims).
- Status webhooks MUST be signed (HMAC or equivalent).
- User PII MUST NOT leave the adapter unencrypted.

## Notes

tenant mobile flows assume a single subscription tier in V1. Multi-tier support requires a future contract revision.
