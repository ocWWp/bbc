## Rules

- Exactly ONE adapter is bound to each role at any moment (V1 simplification; multi-binding for A/B is future F1+F4 work).
- Provisional bindings (status: candidate) MUST be flipped to active or replaced before production traffic.
- Binding changes go through the queue protocol like any Main-owned memory edit. The proposal MUST attach the F1 `pick_trace` (when implemented) as evidence.
- When a provider is decommissioned per F4 Announce → Quarantine → Purge, this file is updated atomically as part of the purge phase.

