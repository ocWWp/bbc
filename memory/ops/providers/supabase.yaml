# Adapter: supabase

## Metadata

- engine: postgres
- engine_version: "15"
- supports_row_level_security: true
- supports_realtime: true
- backup_strategy_url: https://supabase.com/docs/guides/platform/backups
- max_connections: 60                             # default Pro tier; verify per project
- regions: [us-east-1]                            # ASSUMED — verify per 8azi project setup

## Runtime

- endpoint: project-specific (https://<project-ref>.supabase.co)
- auth:
  - service-role key (server-side, full access)
  - anon key (client-side, RLS-gated)
- consumer-side SDK:
  - 8azi-api/app/  (supabase-py)
  - 8azi-web/      (@supabase/supabase-js)
- official sdk: @supabase/supabase-js / supabase (pypi)

