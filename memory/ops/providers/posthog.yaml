# Adapter: posthog

## Metadata

- ingest_rate_per_second: 10000                  # generous; rarely the bottleneck
- query_rate_limit_per_minute: 60                # API; UI is unlimited
- supports_session_replay: true
- supports_feature_flags: true
- price_model: per-event (free up to 1M events/month)

## Runtime

- endpoint: https://us.i.posthog.com/  (or https://eu.i.posthog.com/)
- auth: project API key (client-side; semi-public) + personal API key (server-side reads)
- consumer-side SDKs:
  - 8azi-web: posthog-js
  - 8azi mobile: posthog-react-native
- official sdk: posthog-js / posthog-python

