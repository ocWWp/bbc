## Status: candidate (NOT YET BOUND)

PostHog is the working assumption per `vendors.md`, but Amplitude and Mixpanel are still under evaluation. No production code currently emits events. When binding decision is made, this adapter promotes from `candidate` to `active`.

## Notes

Self-hostable if data residency becomes a concern. Cloud version is the default V1 path.
