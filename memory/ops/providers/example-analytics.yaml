# Adapter: example-analytics

**This is a generic example.** Copy, rename to your chosen vendor (`posthog.yaml`, `mixpanel.yaml`, `amplitude.yaml`, `plausible.yaml`, …), fill in real values, reference in `bindings.yaml`.

## Metadata

- supports_event_tracking: <true | false>
- supports_user_identification: <true | false>
- supports_funnels: <true | false>
- supports_session_recording: <true | false>
- supports_self_host: <true | false>
- gdpr_dpa_available: <true | false>
- residency: [<region-codes the vendor stores data in>]

## Runtime

- endpoint: <https://app.example-analytics.com/api>
- auth: project key in client SDK; server key for export
- official sdk: <npm package | pypi package>

## bbc-provider-tag

```
bbc-provider:example-analytics
```

## Notes

Analytics adapters tend to be early-bound (the SDK ships in your client) and hard to swap later because event taxonomies become a dependency. Pin the event-name conventions in your tenant's `memory/product/events.md` so swapping vendors only changes the transport, not the schema.
