# Adapter: cloudflare-workers

## Metadata

- runtime: workers
- supports_ssr: true
- supports_streaming_responses: true
- cold_start_p95_ms: 50                          # edge: typically near-zero
- regions: global-edge
- price_model: per-request (free tier: 100k req/day)

## Runtime

- deploy: wrangler CLI (8azi-web/wrangler.toml)
- auth: Cloudflare API token in CI
- consumer-side config:
  - 8azi-web/wrangler.toml  (deploy config)
  - 8azi-web/open-next.config.ts  (Next.js → Workers adapter)
- relevant docs: https://developers.cloudflare.com/workers/

