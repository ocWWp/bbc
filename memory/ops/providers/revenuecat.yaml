# Adapter: revenuecat

## Metadata

- supported_platforms: [ios, android]
- supports_promo_codes: true
- supports_grace_period: true
- price_model: revenue-share (1% of tracked revenue, free under threshold)

## Runtime

- endpoint: https://api.revenuecat.com/v1/
- auth: bearer-token (server-side: secret API key; client-side: SDK key)
- consumer-side SDKs:
  - 8azi mobile: react-native-purchases (iOS + Android)
  - 8azi-api: optional server-side validation hooks
- official sdk: react-native-purchases / Purchases for iOS/Android

