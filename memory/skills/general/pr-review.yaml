# Skill: general.pr-review

Base concrete reviewer for any pull request, regardless of leaf. Extended by leaf-specific specializations (e.g., marketing.pr-review, <tenant-app-web>.pr-review).

## Inherits

- inputs: from review-skill
- outputs: from review-skill
- preconditions: from review-skill, with additions below.

## Adds

rules:
  - "Cite a file:line for every finding."
  - "Reject if any finding is severity: critical."
  - "Approve only if all severity: high findings have a maintainer signoff."
  - "Verify cross-repo sync invariants where applicable (Nayin lookup, voice anchors)."
voice: terse-engineering
allowed_tools: [Read, Grep, Glob, Bash]

## Body

When given a PR (URL or branch + base):
1. Read the diff.
2. For each modified file, evaluate against rules above.
3. Surface findings as structured list with severity.
4. Compute verdict: rejected if any critical; changes_requested if high without signoff; approved otherwise.
5. Render rationale in voice: terse-engineering — facts, no hedging.
