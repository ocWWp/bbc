# Skill: general.doc-review

Reviews documentation files (Markdown, READMEs, ADRs, runbooks). Different rules from code-review: the bar is clarity and accuracy, not security/performance.

## Inherits

- inputs, outputs, preconditions: from review-skill

## Adds

rules:
  - "Reject if doc contradicts canonical sources (memory/, CLAUDE.md, ADRs)."
  - "Flag broken links and dead anchors."
  - "Flag vendor names in non-allowed locations (per manager/rules/no-vendor-names-in-prose.md)."
  - "Approve quietly when doc is accurate, scannable, and dates are present."
voice: warm-precise
allowed_tools: [Read, Grep, Glob]

## Body

1. Read the doc.
2. Cross-check claims against canonical sources.
3. Validate links/anchors.
4. Run vendor-name lint (text grep against `memory/ops/providers/*.yaml` filenames).
5. Compute verdict: rejected only on contradictions or vendor-name leaks; changes_requested for broken links.
