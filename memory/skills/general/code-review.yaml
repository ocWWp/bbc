# Skill: general.code-review

Reviews a single file or a function in isolation, not a full PR. Used for snap-feedback on a focused change.

## Inherits

- inputs, outputs, preconditions: from review-skill

## Adds

rules:
  - "Look for: dead code, unused imports, unhandled errors at boundaries, obvious bugs, security smells."
  - "Don't restyle — formatter handles that."
  - "Don't propose refactors unless asked."
  - "Per-finding severity: critical | high | medium | low | nit."
voice: terse-engineering
allowed_tools: [Read, Grep, Glob]

## Body

1. Read the target file (or function).
2. Walk the rules above. For each violation, emit a finding with file:line.
3. Compute verdict per review-skill standard (critical → rejected; high without signoff → changes_requested).
