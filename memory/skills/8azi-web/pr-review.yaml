# Skill: 8azi-web.pr-review

Inherits from `general.pr-review`. Adds web-specific rules + reuses engineering voice.

## Inherits

- inputs, outputs, preconditions, voice: from general.pr-review (terse-engineering)

## Overrides

rules:
  add:
    - "Tailwind classes ordered per the prettier-plugin-tailwindcss spec"
    - "Reject if PR adds direct vendor SDK use without bbc-provider:<id> tag at the call site"
    - "Verify cross-repo voice anchor sync (pillar-interactions.ts ↔ prompts.py)"
    - "Reject if PR introduces vendor name in prose outside allowed locations (per manager/rules/no-vendor-names-in-prose.md)"
  keep_from_parent: true

## Body addendum

When reviewing 8azi-web PRs, also check:
1. Tailwind class ordering in modified TSX files.
2. Any new direct import of a third-party SDK has a `// bbc-provider:<id>` comment at the call site (F4-build-2 convention).
3. Cross-repo voice anchor file (`pillar-interactions.ts`) hasn't drifted from `prompts.py`.
