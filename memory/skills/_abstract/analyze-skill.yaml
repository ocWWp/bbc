# Abstract: analyze-skill

Base for any skill that produces a report from observation, without mutating or judging.

## Inputs

- target: { type: file_path | pr_url | repo_path | dataset_id }
- depth: { type: enum, values: [quick, medium, thorough] }

## Outputs

- report: { type: string, format: markdown }
- findings_count: { type: int }

## Preconditions

- target must exist or be reachable.

## Behavior contract

An analyze-skill produces a report. No verdict, no diff. Subclasses specialize by what they look at and how deep.
