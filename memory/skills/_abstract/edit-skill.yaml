# Abstract: edit-skill

Base for any skill that mutates a target (file, PR description, memory entry, etc.). Distinct from review-skill because edits change state; reviews observe.

## Inputs

- target: { type: file_path | pr_url | memory_id }
- intent: { type: string, max_length: 1000 }      # what change to make

## Outputs

- diff: { type: unified-diff }
- rollback_safe: { type: bool }                    # is this reversible without manual intervention?

## Preconditions

- target must exist and be writable.
- caller must have write access (verified via owning_layer rules).

## Behavior contract

An edit-skill produces a diff. It does NOT apply the diff itself — application goes through the queue protocol (propose → review → accept) for any cross-layer edit, or through layer-local writes for within-layer edits.
