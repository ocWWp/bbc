# === inherited from review-skill (memory/skills/_abstract/review-skill.yaml) ===
# Abstract: review-skill

Base for any skill that reviews something (PRs, code, docs, designs) and produces a verdict.

## Inputs

- target: { type: file_path | pr_url | text-block }
- context: { type: object, optional: true }

## Outputs

- verdict: { type: enum, values: [approved, changes_requested, rejected] }
- rationale: { type: string, max_length: 2000 }
- findings: { type: list, item_type: finding }

## Preconditions

- target must exist or be reachable.
- caller must have read access to target.

## Behavior contract

A review-skill produces a verdict + rationale + findings. It does NOT mutate the target. Concrete subclasses define the specific rules used to derive the verdict.

# === inherited from general.pr-review (memory/skills/general/pr-review.yaml) ===
# Skill: general.pr-review

Base concrete reviewer for any pull request, regardless of leaf. Extended by leaf-specific specializations (e.g., marketing.pr-review, 8azi-web.pr-review).

## Inherits

- inputs: from review-skill
- outputs: from review-skill
- preconditions: from review-skill, with additions below.

## Adds

rules:
  - "Cite a file:line for every finding."
  - "Reject if any finding is severity: critical."
  - "Approve only if all severity: high findings have a maintainer signoff."
  - "Verify cross-repo sync invariants where applicable (Nayin lookup, voice anchors)."
voice: terse-engineering
allowed_tools: [Read, Grep, Glob, Bash]

## Body

When given a PR (URL or branch + base):
1. Read the diff.
2. For each modified file, evaluate against rules above.
3. Surface findings as structured list with severity.
4. Compute verdict: rejected if any critical; changes_requested if high without signoff; approved otherwise.
5. Render rationale in voice: terse-engineering — facts, no hedging.

# === inherited from 8azi-api.pr-review (memory/skills/8azi-api/pr-review.yaml) ===
# Skill: 8azi-api.pr-review

Backend reviewer with strict security + API-shape rules. Inherits from `general.pr-review`.

## Inherits

- inputs, outputs, preconditions, voice: from general.pr-review (terse-engineering)

## Overrides

rules:
  add:
    - "Reject any PR that exposes service-role keys to client code paths"
    - "Reject PRs adding new endpoints without rate-limit middleware"
    - "Reject PRs adding new Pydantic models without input validation"
    - "Verify Nayin lookup sync is intact (cross-repo test passes)"
    - "Reject if PR adds direct vendor SDK use without bbc-provider:<id> tag at the call site"
  keep_from_parent: true

## Body addendum

API reviews are stricter on security. The default verdict bias is toward `changes_requested` for any auth/RLS/secret-related changes; explicit signoff required from a maintainer.
