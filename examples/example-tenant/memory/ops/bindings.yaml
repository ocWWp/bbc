## Rules

- Exactly ONE adapter is bound to each role at any moment.
- Provisional bindings (status: candidate) MUST be flipped to active or replaced before production traffic.
- Binding changes go through the queue protocol like any Main-owned memory edit. The proposal MUST cite an ADR explaining the rationale.
- Adding a new role (e.g., `subscription-receipt`, `image-edit-provider`) requires extending BBC's `memory/ops/provider-roles/` with the contract first.

