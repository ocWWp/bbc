name = "bbc-dashboard"
main = ".open-next/worker.js"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# OpenNext outputs static + dynamic assets here.
assets = { directory = ".open-next/assets", binding = "ASSETS" }

# Custom domain. Requires the bigbraincompany.online zone to be Active in
# Cloudflare before `wrangler deploy` runs — wrangler provisions the custom
# domain (and its TLS cert) on first deploy. The Next.js app serves both the
# landing page (/landing) and the dashboard from this single origin.
routes = [
  { pattern = "bigbraincompany.online", custom_domain = true },
]

# Env vars set in the Cloudflare Workers dashboard (Settings → Variables):
#   NEXT_PUBLIC_SUPABASE_URL
#   NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
#   SUPABASE_SERVICE_ROLE_KEY
#   ANTHROPIC_API_KEY            (optional; tenants can BYOK at /settings/keys)
#   BBC_SECRET_ENCRYPTION_KEY    (REQUIRED; openssl rand -base64 32)
#   BBC_SIGNUP_MODE              (open | invite_only)
#   BBC_HOSTED_DEMO_MODE         (true on the hosted demo, false elsewhere)
#   BBC_OAUTH_PROVIDERS          (optional override; defaults to "github,google".
#                                 Set to "" to disable all OAuth, or to one
#                                 provider id to enable only that one.)
#   BBC_OAUTH_STATE_SECRET       (REQUIRED if any OAuth connector installed;
#                                 openssl rand -base64 32. HMAC signing key for
#                                 /api/oauth/* state. Cloudflare unset env = "",
#                                 which causes those routes to refuse to boot.)
#   BBC_GOOGLE_OAUTH_CLIENT_ID   (REQUIRED to install Gmail/Drive; from Google Cloud
#                                 console → OAuth client (Web).)
#   BBC_GOOGLE_OAUTH_CLIENT_SECRET (REQUIRED to install Gmail/Drive; pair with
#                                 client id above. Store via `wrangler secret put`.)
#   BBC_PUBLIC_URL               (REQUIRED to install Gmail/Drive; canonical origin
#                                 used to build the OAuth redirect_uri. Must match
#                                 the value whitelisted in the Google Cloud console.)
#   BBC_GOOGLE_OAUTH_VERIFIED    (optional; "true" once your Google OAuth app has
#                                 cleared verification. While unset/empty/"false"
#                                 the dashboard surfaces a "this app isn't verified"
#                                 warning on Gmail/Drive. Defaults to false.)
#
# See memory/ops/providers/google.md for the 100-user Testing-mode cap and
# the verification path. These are NOT inlined here on purpose — keep secrets
# in the dashboard's encrypted env, not in the repo. wrangler reads them at
# deploy time.
